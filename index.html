<!DOCTYPE html>
<html lang="en">
<head>

<style>

.root-layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Customer App ── */

.phone-wrap { display: flex; flex-direction: column; align-items: center; }

.screen { flex: 1; display: flex; flex-direction: column; background: #fff; }

.bottom-nav { display: flex; border-top: 1px solid #ccc; flex-shrink: 0; }

.btn-primary { width: 100%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: monospace; font-weight: bold; }
.btn-primary:hover { background: #555; }

.btn-secondary { width: 100%; padding: 10px; background: #fff; color: #333; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: monospace; }

.link-btn { background: none; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 13px; font-family: monospace; }

.input-group { display: flex; gap: 0; }

.card { border: 1px solid #ccc; border-radius: 4px; padding: 14px; margin-bottom: 12px; background: #fff; }

.img-placeholder { background: #e0e0e0; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

.img-placeholder::before { transform: rotate(35deg); }
.img-placeholder::after { transform: rotate(-35deg); }
.img-placeholder span { z-index: 1; font-size: 11px; color: #999; font-family: monospace; background: #e0e0e0; padding: 2px 4px; }

.sport-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.sport-card { border: 1px solid #ccc; border-radius: 4px; padding: 18px 12px; text-align: center; cursor: pointer; background: #fff; }

.date-picker { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; }

.slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }

.slot-btn.selected { background: #333; color: #fff; border-color: #333; }
.slot-btn.hotspot { border: 2px solid #b8860b; background: #fffbf0; color: #b8860b; cursor: pointer; }
.slot-btn.hotspot:hover { background: #fff8e0; }

.stepper { display: flex; align-items: center; gap: 12px; }
.stepper-btn { width: 32px; height: 32px; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #333; }
.stepper-btn:hover { background: #e0e0e0; }
.stepper-val { font-size: 20px; font-weight: bold; font-family: monospace; color: #333; min-width: 32px; text-align: center; }

.toggle-row { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; cursor: pointer; }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: #ccc; position: relative; flex-shrink: 0; transition: background 0.2s; }
.toggle.on { background: #555; }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
.toggle.on::after { left: 18px; }

.radio-option { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
.radio-option.selected { border-color: #333; background: #f8f8f8; }
.radio-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.radio-option.selected .radio-dot { border-color: #333; }
.radio-dot::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: transparent; }
.radio-option.selected .radio-dot::after { background: #333; }

.qr-placeholder { width: 120px; height: 120px; border: 2px solid #333; display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; padding: 8px; margin: 0 auto 16px; }
.qr-cell { background: #333; }
.qr-cell.light { background: #fff; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 10px; font-family: monospace; font-weight: bold; }
.badge-confirmed { background: #e8e8e8; color: #333; border: 1px solid #999; }
.badge-completed { background: #f0f0f0; color: #888; border: 1px solid #ccc; }
.badge-coming-soon { background: #f0f0f0; color: #999; border: 1px solid #ccc; }
.badge-skill { background: #f0f0f0; color: #555; border: 1px solid #ccc; font-size: 10px; padding: 1px 6px; }
.badge-winning { background: #e8e8e8; color: #333; border: 1px solid #999; }
.badge-outbid { background: #f5f0e0; color: #b8860b; border: 1px solid #b8860b; }

.price-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-family: monospace; color: #333; }
.price-row.total { border-top: 2px solid #333; border-bottom: none; font-weight: bold; font-size: 15px; margin-top: 4px; }

.tab-bar { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: none; border: none; font-family: monospace; font-size: 13px; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab-btn.active { color: #333; border-bottom-color: #333; font-weight: bold; }

.otp-row { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
.otp-input { width: 52px; height: 56px; border: 2px solid #ccc; border-radius: 4px; text-align: center; font-size: 24px; font-family: monospace; color: #333; }
.otp-input:focus { outline: none; border-color: #333; }

.booking-card { border: 1px solid #ccc; border-radius: 4px; padding: 12px; margin-bottom: 10px; }
.booking-card-row { display: flex; justify-content: space-between; align-items: center; }

.court-card { border: 1px solid #ccc; border-radius: 4px; padding: 14px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

.avail-count { font-size: 12px; font-family: monospace; color: #666; }

.package-card { border: 1px solid #ccc; border-radius: 4px; padding: 14px; margin-bottom: 12px; }

.profile-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #e0e0e0; cursor: pointer; }
.profile-item:hover { background: #f8f8f8; margin: 0 -16px; padding: 14px 16px; }
.profile-item:last-child { border-bottom: none; }

.section-label { font-size: 11px; font-family: monospace; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px; }

.splash-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px 32px; background: #fff; }
.bounce-logo { border: 3px solid #333; padding: 20px 40px; border-radius: 4px; font-size: 28px; font-weight: bold; font-family: monospace; color: #333; letter-spacing: 4px; }
.tagline { font-size: 14px; font-family: monospace; color: #888; }

.summary-card { border: 2px solid #333; border-radius: 4px; padding: 14px; margin-bottom: 14px; }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; font-family: monospace; color: #333; padding: 3px 0; }
.summary-row .label { color: #888; }

.big-amount { font-size: 32px; font-weight: bold; font-family: monospace; color: #333; text-align: center; padding: 16px 0; }
.confirm-check { width: 72px; height: 72px; border: 3px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 16px; }

.chip { display: inline-block; padding: 4px 10px; border: 1px solid #ccc; border-radius: 20px; font-size: 11px; font-family: monospace; color: #555; cursor: pointer; margin: 3px; }
.chip.selected { background: #333; color: #fff; border-color: #333; }

.player-card { border: 1px solid #ccc; border-radius: 4px; padding: 12px; margin-bottom: 10px; }
.player-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ccc; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: bold; font-size: 13px; color: #333; flex-shrink: 0; }

.bid-card { border: 1px solid #ccc; border-radius: 4px; padding: 12px; margin-bottom: 10px; }

/* ── Admin App (adm- prefixed) ── */
.adm-shell { display: flex; height: 100%; background: #fff; }
.adm-sidebar { width: 200px; flex-shrink: 0; background: #f0f0f0; border-right: 1px solid #ccc; display: flex; flex-direction: column; }

.adm-sidebar-nav { flex: 1; padding: 8px 0; }
.adm-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; color: #555; cursor: pointer; border-left: 2px solid transparent; background: transparent; width: 100%; text-align: left; border-top: none; border-right: none; border-bottom: none; font-family: system-ui, sans-serif; }
.adm-nav-item:hover { background: #e8e8e8; color: #333; }
.adm-nav-item.active { background: #e0e0e0; color: #333; font-weight: bold; border-left-color: #333; }

.adm-sidebar-footer { padding: 12px 14px; border-top: 1px solid #ccc; font-size: 11px; font-family: monospace; color: #888; }

.adm-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.adm-topbar-title { font-size: 15px; font-weight: bold; color: #333; font-family: monospace; }

.adm-topbar-right { display: flex; align-items: center; gap: 12px; }
.adm-avatar-circle { width: 32px; height: 32px; border: 1px solid #ccc; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: monospace; font-weight: bold; color: #333; }
.adm-topbar-name { font-size: 12px; color: #555; }
.adm-btn-logout { font-size: 11px; font-family: monospace; border: 1px solid #ccc; background: #fff; color: #555; padding: 4px 10px; cursor: pointer; border-radius: 2px; }
.adm-btn-logout:hover { background: #f0f0f0; color: #333; }
.adm-page-content { flex: 1; overflow: auto; padding: 20px; background: #fff; }

.adm-card { border: 1px solid #ccc; border-radius: 4px; background: #fff; padding: 14px; }
.adm-card-gray { background: #f9f9f9; }
.adm-btn { border: 1px solid #ccc; background: #fff; color: #333; font-size: 12px; padding: 6px 12px; cursor: pointer; border-radius: 2px; font-family: monospace; }
.adm-btn:hover { background: #f0f0f0; }
.adm-btn-dark { background: #333; color: #fff; border-color: #333; }

.adm-btn-sm { padding: 4px 8px; font-size: 11px; }
.adm-btn-primary { background: #333; color: #fff; border-color: #333; font-weight: bold; }
.adm-btn-primary:hover { background: #111; }
.adm-btn-primary:disabled { background: #aaa; border-color: #aaa; cursor: not-allowed; }

.adm-badge { display: inline-block; font-size: 10px; font-family: monospace; padding: 2px 7px; border-radius: 2px; border: 1px solid #ccc; }
.adm-badge-confirmed { background: #f0f0f0; border-color: #ccc; color: #333; }
.adm-badge-cancelled { background: #e8e8e8; border-color: #bbb; color: #888; text-decoration: line-through; }
.adm-badge-active { background: #e8e8e8; border-color: #aaa; color: #333; }
.adm-badge-inactive { background: #f5f5f5; border-color: #ddd; color: #aaa; }
.adm-badge-super { background: #333; color: #fff; border-color: #333; }

.adm-input-field { width: 100%; border: 1px solid #ccc; padding: 7px 10px; font-size: 13px; color: #333; background: #fff; border-radius: 2px; outline: none; font-family: monospace; }
.adm-input-field:focus { border-color: #333; }
.adm-input-field:disabled { background: #f0f0f0; color: #aaa; }

.adm-login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
.adm-login-box { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 28px; width: 320px; }
.adm-login-logo { text-align: center; margin-bottom: 20px; }
.adm-login-title { font-family: monospace; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; color: #333; }
.adm-error-box { background: #f5f5f5; border: 1px solid #ccc; padding: 8px 12px; font-size: 12px; color: #555; margin-bottom: 12px; font-family: monospace; border-radius: 2px; }
.adm-pw-wrap { position: relative; }
.adm-pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; font-family: monospace; color: #888; cursor: pointer; background: none; border: none; }
.adm-login-hint { font-size: 10px; font-family: monospace; color: #aaa; text-align: center; margin-top: 10px; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 13px; font-family: monospace; font-weight: bold; color: #333; text-transform: uppercase; letter-spacing: 1px; }
.section-count { font-size: 12px; color: #888; font-family: monospace; }

.lbl { display: block; font-size: 10px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 4px; }
.select-field { width: 100%; border: 1px solid #ccc; padding: 7px 10px; font-size: 13px; color: #333; background: #fff; border-radius: 2px; outline: none; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.wf-table { width: 100%; border-collapse: collapse; font-size: 12px; }

.table-wrap { border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }

.bar-chart { margin-bottom: 20px; }

.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 1px solid #ccc; transition: left 0.15s; }

function JourneyTracker({ history, current, onNavigate }) {
  const visited = new Set(history);
  return (
    <div className="journey-tracker">
      <h3>Journey</h3>
      {SCREENS.map(s => {
        const isVisited = visited.has(s.id);
        const isCurrent = s.id === current;
        return (
          <div key={s.id} className={`journey-item ${isCurrent?'current':isVisited?'visited':''}`}
            onClick={() => isVisited && !isCurrent && onNavigate(s.id)}>
            <div className="dot" />
            <span className="journey-label">{s.label}</span>
          </div>
        );
      })}
    </div>
  );
}

function FeaturesPanel({ screen }) {
  const info = SCREEN_FEATURES[screen] || { name:screen, features:[] };
  return (
    <div className="features-panel">
      <h3>Screen Features</h3>
      <div className="screen-name">{info.name}</div>
      <ul>{info.features.map((f,i) => <li key={i}>{f}</li>)}</ul>
    </div>
  );
}

function SlotGrid({ slots, selectedSlots=[], onToggle, onSelect, onHotspot, multiSelect=true }) {
  return (
    <div className="slot-grid">
      {HOURS.map(h => {
        const state = slots[h] || 'available';
        const isSelected = multiSelect && selectedSlots.includes(h);
        const isHotspot = state === 'hotspot';
        return (
          <button key={h}
            className={`slot-btn ${isHotspot?'hotspot':state} ${isSelected?'selected':''}`}
            disabled={state==='booked'}
            onClick={() => {
              if (state==='booked') return;
              if (isHotspot) { onHotspot && onHotspot(h); return; }
              if (multiSelect) onToggle && onToggle(h);
              else onSelect && onSelect(h);
            }}
          >
            <span style={{fontSize:9}}>{h}:00</span>
            <span style={{fontSize:8}}>–{h+1}:00</span>
            {state==='booked' && <span style={{fontSize:7}}>Booked</span>}
            {isHotspot && <span style={{fontSize:9}}>🔥</span>}
          </button>
        );
      })}
    </div>
  );
}

function SlotSelectionScreen({ navigate, sport, court, selectedSlots, setSelectedSlots, setBidSlot, hotspotConfig }) {
  const [dateIdx, setDateIdx] = useState(0);
  const [recurring, setRecurring] = useState(false);
  const isFieldSport = sport==='cricket'||sport==='futsal';
  const sportLabels = { pickleball:'Pickleball', badminton:'Badminton', cricket:'Cricket', futsal:'Futsal' };
  const sportLabel = sportLabels[sport] || sport;

  let baseSlots;
  if (court==='Auto-Assigned'||court==='Court A') baseSlots = COURTA_PB_SLOTS;
  else if (court==='Court B') baseSlots = COURTB_SLOTS;
  else if (isFieldSport) baseSlots = FIELD_SLOTS;
  else baseSlots = KIDS_SLOTS;

  const currentDate = DATES[dateIdx]?.iso || '';
  const effectiveSlots = { ...baseSlots };
  (hotspotConfig||[]).forEach(hs => {
    const matchCourt = court==='Auto-Assigned'?'Court A':court;
    if (hs.court===matchCourt && hs.date===currentDate && hs.isHotspot) {
      if (effectiveSlots[hs.hour]==='available') effectiveSlots[hs.hour]='hotspot';
    }
  });

  const dateLabel = DATES[dateIdx]?.full||'';
  const toggleSlot = h => setSelectedSlots(prev => prev.includes(h)?prev.filter(s=>s!==h):[...prev,h].sort((a,b)=>a-b));
  const handleHotspot = h => {
    setBidSlot({ hour:h, court, sport, date:dateLabel, currentBid:3500, minIncrement:500 });
    navigate('bidflow');
  };

  const baseDate = new Date(2026,3,18+dateIdx);
  const recurrences = Array.from({length:4},(_,i) => {
    const d = new Date(baseDate); d.setDate(d.getDate()+(i+1)*7);
    return { week:i+1, label:d.toLocaleDateString('en',{month:'short',day:'numeric'}), conflicts:selectedSlots.filter(h=>(RECURRING_CONFLICTS[i]||[]).includes(h)) };
  });
  const canContinue = selectedSlots.length>0;
  const hasConflicts = recurring && recurrences.some(r=>r.conflicts.length>0);
  const displayCourt = court==='Auto-Assigned'?`${sportLabel} — Auto-Assigned`:court;

  return (
    <div className="screen">
      <div className="screen-header">
        <button className="back-btn" onClick={() => navigate('home')}>←</button>
        <div>
          <div className="screen-title">{displayCourt}</div>
          <div style={{fontFamily:'monospace',fontSize:11,color:'#888'}}>{dateLabel}</div>
        </div>
      </div>
      <div className="screen-body">
        <div className="section-label">Select Date</div>
        <DatePicker selected={dateIdx} onSelect={i => { setDateIdx(i); setSelectedSlots([]); }} />
        <div className="section-label">Select 1-hour slots (multi-select)</div>
        <div style={{display:'flex',gap:12,marginBottom:10,fontSize:11,fontFamily:'monospace',color:'#666'}}>
          <span>○ Available</span>
          <span style={{color:'#aaa'}}>⬛ Booked</span>
          <span style={{color:'#b8860b'}}>🔥 Hotspot</span>
        </div>
        <SlotGrid slots={effectiveSlots} selectedSlots={selectedSlots} onToggle={toggleSlot} onHotspot={handleHotspot} multiSelect={true} />
        <div className="section-label" style={{marginTop:14}}>Recurring Booking</div>
        <div className="toggle-row" onClick={() => setRecurring(!recurring)}>
          <div className={`toggle ${recurring?'on':''}`} />
          <div>
            <div style={{fontFamily:'monospace',fontSize:13,color:'#333'}}>🔁 Repeat weekly</div>
            <div style={{fontFamily:'monospace',fontSize:11,color:'#888'}}>Books the same slots for the next 4 weeks</div>
          </div>
        </div>
        {recurring && canContinue && (
          <div style={{border:'1px solid #ccc',borderRadius:4,marginBottom:4,overflow:'hidden'}}>
            <div style={{padding:'8px 12px',background:'#f0f0f0',borderBottom:'1px solid #e0e0e0',fontFamily:'monospace',fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:'0.5px'}}>Recurrence Preview</div>
            {recurrences.map(r => (
              <div key={r.week} style={{padding:'9px 12px',borderBottom:'1px solid #f0f0f0',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontFamily:'monospace',fontSize:12,color:'#333'}}>Week {r.week} — {r.label}</div>
                  {r.conflicts.length>0 && <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginTop:2}}>⚠️ Conflict at {r.conflicts.map(h=>`${h}:00`).join(', ')} — will be skipped</div>}
                </div>
                <span style={{fontFamily:'monospace',fontSize:11}}>{r.conflicts.length>0?'⚠️ Partial':'✓ Clear'}</span>
              </div>
            ))}
          </div>
        )}
        {hasConflicts && <div style={{marginTop:8,padding:'8px 10px',background:'#f5f5f5',border:'1px solid #ccc',borderRadius:4,fontFamily:'monospace',fontSize:11,color:'#555'}}>⚠️ Some recurring weeks have conflicts. Those slots will be skipped.</div>}
        <div style={{marginTop:14}}>
          <button className="btn-primary" disabled={!canContinue} onClick={() => navigate('summary')}>
            {canContinue?`Review & Add to Cart — ${selectedSlots.length} slot${selectedSlots.length>1?'s':''}${recurring?' · 4 weeks':''}` : 'Select at least 1 slot'}
          </button>
        </div>
      </div>
    </div>
  );
}

function BookingSummaryScreen({ navigate, sport, court, selectedSlots, playerCount, setPlayerCount, kidsAdded, setKidsAdded, recoveryAdded, setRecoveryAdded, equipSets, setEquipSets, kidsCount, setKidsCount, cart, setCart, setSharedRecovery }) {
  const sportLabel = { pickleball:'Pickleball', badminton:'Badminton', cricket:'Cricket', futsal:'Futsal' }[sport]||sport;
  const sorted = [...selectedSlots].sort((a,b)=>a-b);
  const recoveryUnlocked = sorted.length>=2 && playerCount>=2;
  const recoverySlot = sorted.length>0 ? sorted[sorted.length-1]+1 : null;
  const isFieldSport = sport==='cricket'||sport==='futsal';
  const maxPlayers = sport==='cricket'?22:sport==='futsal'?10:4;
  const minPlayers = isFieldSport?1:2;
  const displayCourt = court==='Auto-Assigned'?'Auto-Assigned':court;
  const equipSet = EQUIPMENT_SETS_CONFIG[sport]||null;
  const equipTotal = equipSet ? equipSet.pricePerSet * equipSets : 0;

  const courtFee = 3000 * Math.max(sorted.length,1);
  const kidsFee  = kidsAdded ? 750 * kidsCount * sorted.length : 0;
  const recFee   = (recoveryAdded&&recoveryUnlocked) ? RECOVERY_RATE_PER_HEAD * Math.min(playerCount,8) : 0;
  const total    = courtFee + kidsFee + equipTotal + recFee;

  const handleAddToCart = () => {
    const item = { id:Date.now(), sport, sportLabel, court, date:DATES[0].full, slots:sorted, playerCount,
      kidsAdded, kidsCount:kidsAdded?kidsCount:0,
      recoveryAdded:recoveryAdded&&recoveryUnlocked, recoverySlot:recoveryAdded&&recoveryUnlocked?recoverySlot:null,
      equipSets, equipSetName:equipSet?equipSet.setName:null,
      subtotal:total };
    setCart(prev=>[...prev,item]);
    if (recoveryAdded&&recoveryUnlocked&&setSharedRecovery) {
      setSharedRecovery(prev=>[...prev,{ id:`REC-${Date.now()}`, date:'2026-04-20', time:`${recoverySlot}:00–${recoverySlot+1}:00`, bookingId:`BNC-${Date.now()}`, customer:'Dusara Abeysinghe', linkedCourt:court==='Auto-Assigned'?'Court A':court, players:playerCount, status:'Confirmed' }]);
    }
    setEquipSets(0);
    setKidsAdded(false);
    setRecoveryAdded(false);
    navigate('cart');
  };

  return (
    <div className="screen">
      <div className="screen-header">
        <button className="back-btn" onClick={() => navigate('slots')}>←</button>
        <span className="screen-title">Booking Summary</span>
      </div>
      <div className="screen-body">
        <div className="summary-card">
          <div className="summary-row"><span className="label">Sport</span><span>{sportLabel}</span></div>

  const [skillFilter, setSkillFilter] = useState('');
  const [sent, setSent] = useState({});
  const allSports = ['Pickleball','Badminton','Cricket','Futsal'];
  const allSkills = ['Beginner','Intermediate','Advanced'];
  const filtered = MOCK_PLAYERS.filter(p => {
    if (sportFilter && !p.sports.includes(sportFilter)) return false;
    if (skillFilter && p.skillLevel!==skillFilter) return false;
    return true;
  });
  const requestMatch = p => {
    setSent(prev=>({...prev,[p.id]:true}));
    setMatchRequests(prev=>[...prev,{ id:`MR-${Date.now()}`, dir:'out', player:p.name, initials:p.initials, sport:p.sports[0], skillLevel:p.skillLevel, dates:['Apr 25','Apr 26','Apr 27'], status:'pending' }]);
  };
  return (
    <div className="screen">
      <div className="screen-header">
        <button className="back-btn" onClick={() => navigate('matchhub')}>←</button>
        <span className="screen-title">Find a Player</span>
      </div>
      <div className="screen-body">
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Sport</div>
          <div style={{marginBottom:10}}>
            <span className={`chip ${!sportFilter?'selected':''}`} onClick={() => setSportFilter('')}>All</span>
            {allSports.map(s=><span key={s} className={`chip ${sportFilter===s?'selected':''}`} onClick={() => setSportFilter(s)}>{s}</span>)}
          </div>
          <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}}>Skill</div>
          <div>
            <span className={`chip ${!skillFilter?'selected':''}`} onClick={() => setSkillFilter('')}>All</span>
            {allSkills.map(s=><span key={s} className={`chip ${skillFilter===s?'selected':''}`} onClick={() => setSkillFilter(s)}>{s}</span>)}
          </div>
        </div>
        {filtered.map(p => (
          <div key={p.id} className="player-card">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div className="player-avatar">{p.initials}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'monospace',fontSize:13,fontWeight:'bold',color:'#333'}}>{p.name}</div>
                <span className="badge badge-skill">{p.skillLevel}</span>
              </div>
            </div>
            <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:4}}>Sports: {p.sports.join(', ')}</div>
            <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:8}}>Available: {p.days.join(', ')}</div>
            <button className={sent[p.id]?'btn-secondary':'btn-primary'} disabled={!!sent[p.id]} onClick={() => requestMatch(p)} style={{fontSize:12,padding:8}}>
              {sent[p.id]?'✓ Request Sent':'Request Match'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function MatchRequestsScreen({ navigate, matchRequests, setMatchRequests, setPlayDates }) {
  const [tab, setTab] = useState('received');
  const incoming = matchRequests.filter(r=>r.dir==='in');
  const outgoing = matchRequests.filter(r=>r.dir==='out');
  const accept = r => {
    setMatchRequests(prev=>prev.map(m=>m.id===r.id?{...m,status:'accepted'}:m));
    setPlayDates(prev=>[...prev,{ id:Date.now(), opponent:r.player, sport:r.sport, court:'Court A', date:r.dates[0], kidsAdded:true }]);
  };
  const decline = r => setMatchRequests(prev=>prev.map(m=>m.id===r.id?{...m,status:'declined'}:m));
  const RequestCard = ({ r }) => (
    <div className="player-card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <div className="player-avatar">{r.initials}</div>
        <div>
          <div style={{fontFamily:'monospace',fontSize:13,fontWeight:'bold',color:'#333'}}>{r.player}</div>
          <span className="badge badge-skill">{r.skillLevel}</span>
        </div>
      </div>
      <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:6}}>Sport: {r.sport}</div>
      <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:8}}>Proposed: {r.dates.join(' · ')}</div>
      {r.status==='pending'&&r.dir==='in' && (
        <div style={{display:'flex',gap:8}}>
          <button className="btn-primary" style={{fontSize:12,padding:8}} onClick={() => accept(r)}>Accept</button>
          <button className="btn-secondary" style={{fontSize:12,padding:8}} onClick={() => decline(r)}>Decline</button>
        </div>
      )}
      {r.status!=='pending' && <div style={{fontFamily:'monospace',fontSize:11,color:r.status==='accepted'?'#555':'#aaa',textTransform:'capitalize'}}>● {r.status}</div>}
      {r.dir==='out'&&r.status==='pending' && <div style={{fontFamily:'monospace',fontSize:11,color:'#888'}}>● Awaiting response</div>}
    </div>
  );
  return (
    <div className="screen">
      <div className="screen-header">
        <button className="back-btn" onClick={() => navigate('matchhub')}>←</button>
        <span className="screen-title">Match Requests</span>
      </div>
      <div className="screen-body">
        <div className="tab-bar">
          <button className={`tab-btn ${tab==='received'?'active':''}`} onClick={() => setTab('received')}>Received {incoming.length>0&&`(${incoming.length})`}</button>
          <button className={`tab-btn ${tab==='sent'?'active':''}`} onClick={() => setTab('sent')}>Sent</button>
        </div>
        {tab==='received'&&(incoming.length===0?<div style={{textAlign:'center',fontFamily:'monospace',fontSize:13,color:'#aaa',marginTop:32}}>No incoming requests</div>:incoming.map(r=><RequestCard key={r.id} r={r}/>))}
        {tab==='sent'&&(outgoing.length===0?<div style={{textAlign:'center',fontFamily:'monospace',fontSize:13,color:'#aaa',marginTop:32}}>No sent requests</div>:outgoing.map(r=><RequestCard key={r.id} r={r}/>))}
      </div>
    </div>
  );
}

function BidFlowScreen({ navigate, bidSlot, myBids, setMyBids, setSharedBids }) {
  const minBid = (bidSlot?.currentBid||3500)+(bidSlot?.minIncrement||500);
  const [bidAmount, setBidAmount] = useState(minBid);
  const increment = () => setBidAmount(prev=>prev+500);
  const decrement = () => setBidAmount(prev=>Math.max(minBid,prev-500));
  const placeBid = () => {
    const newBid = { id:`BID-${Date.now()}`, court:bidSlot.court, date:bidSlot.date, hour:bidSlot.hour, sport:bidSlot.sport||'', bidder:'Dusara Abeysinghe', phone:'+94 77 123 4567', amount:bidAmount, placed:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}), status:'Active' };
    if (setSharedBids) setSharedBids(prev=>[...prev,newBid]);
    setMyBids(prev=>[...prev,newBid.id]);
    navigate('bidconfirm');
  };
  if (!bidSlot) return (
    <div className="screen">
      <div className="screen-header"><button className="back-btn" onClick={() => navigate('slots')}>←</button><span className="screen-title">Bid on Slot</span></div>
      <div className="screen-body" style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
        <div style={{fontFamily:'monospace',color:'#888'}}>No hotspot slot selected</div>
      </div>
    </div>
  );
  return (
    <div className="screen">
      <div className="screen-header">
        <button className="back-btn" onClick={() => navigate('slots')}>←</button>
        <span className="screen-title">🔥 Hotspot Bid</span>
      </div>
      <div className="screen-body">
        <div className="summary-card">
          <div className="summary-row"><span className="label">Court</span><span>{bidSlot.court}</span></div>
          <div className="summary-row"><span className="label">Date</span><span>{bidSlot.date}</span></div>
          <div className="summary-row"><span className="label">Time</span><span>{bidSlot.hour}:00 – {bidSlot.hour+1}:00</span></div>
          <div className="summary-row"><span className="label">Current Highest</span><span style={{fontWeight:'bold'}}>LKR {(bidSlot.currentBid||3500).toLocaleString()}</span></div>
          <div className="summary-row"><span className="label">Min Increment</span><span>LKR {(bidSlot.minIncrement||500).toLocaleString()}</span></div>
        </div>
        <div className="section-label">Your Bid</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20,padding:20,border:'1px solid #ccc',borderRadius:4,marginBottom:20}}>
          <button className="stepper-btn" onClick={decrement} style={{width:44,height:44,fontSize:22}}>−</button>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'monospace',fontSize:11,color:'#888',marginBottom:4}}>Your Bid</div>
            <div style={{fontFamily:'monospace',fontSize:24,fontWeight:'bold',color:'#333'}}>LKR {bidAmount.toLocaleString()}</div>
          </div>
          <button className="stepper-btn" onClick={increment} style={{width:44,height:44,fontSize:22}}>+</button>
        </div>
        <button className="btn-primary" style={{marginBottom:10}} onClick={placeBid}>Place Bid — LKR {bidAmount.toLocaleString()}</button>
        <button className="btn-secondary" onClick={() => navigate('slots')}>Cancel</button>
      </div>
    </div>
  );
}

function FormGroup({ label, children }) {
  return (
    <div className="form-group">
      {label&&<label className="lbl">{label}</label>}
      {children}
    </div>
  );
}

function getSportSwitches(bookings, courtId, date) {
  const sorted = bookings
    .filter(b=>b.court===courtId&&b.date===date&&b.status==='Confirmed')
    .sort((a,b)=>parseInt(a.start)-parseInt(b.start));
  const switches=[];
  for (let i=0;i<sorted.length-1;i++) {
    if (sorted[i].sport!==sorted[i+1].sport&&sorted[i].end===sorted[i+1].start) {
      switches.push({ at:sorted[i].end, from:sorted[i].sport, to:sorted[i+1].sport, court:courtId });
    }
  }
  return switches;
}

// ─── ADMIN PAGE: HOTSPOT BIDS ────────────────────────────────────────────────
function HotspotBidsPage({ sharedBids, setSharedBids, hotspotConfig, setHotspotConfig }) {
  const bids = sharedBids || [];
  const config = hotspotConfig || [];
  const SPORT_ICONS = { Pickleball:'🏓', Badminton:'🏸', Cricket:'🏏', Futsal:'⚽' };

  const toggleHotspot = (idx) => {
    if (setHotspotConfig) setHotspotConfig(prev=>prev.map((h,i)=>i===idx?{...h,isHotspot:!h.isHotspot}:h));
  };

  const acceptBid = (bidId) => {
    if (!setSharedBids) return;
    setSharedBids(prev => {
      const accepted = prev.find(b=>b.id===bidId);
      return prev.map(b => {
        if (b.id===bidId) return {...b, status:'Accepted'};
        if (b.status==='Active' && accepted && b.court===accepted.court && b.date===accepted.date && b.hour===accepted.hour) return {...b, status:'Outbid'};
        return b;
      });
    });
  };

  return (
    <div>
      <div className="adm-card" style={{padding:16,marginBottom:20}}>
        <div style={{fontWeight:600,marginBottom:12,fontSize:13,textTransform:'uppercase',letterSpacing:'0.5px'}}>Hotspot Slot Configuration</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr style={{background:'#f5f5f5'}}>
              {['Court','Date','Hour','Floor Price','Status','Action'].map(h=>(
                <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600,borderBottom:'1px solid #e0e0e0',fontSize:11,textTransform:'uppercase',letterSpacing:'0.3px'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {config.map((hs,i)=>(
              <tr key={i} style={{borderBottom:'1px solid #f0f0f0',background:hs.isHotspot?'#fffbf0':'#fff'}}>
                <td style={{padding:'8px 12px'}}>{hs.court}</td>
                <td style={{padding:'8px 12px',fontFamily:'monospace'}}>{hs.date}</td>
                <td style={{padding:'8px 12px',fontFamily:'monospace'}}>{String(hs.hour).padStart(2,'0')}:00</td>
                <td style={{padding:'8px 12px',fontFamily:'monospace'}}>LKR {hs.floor.toLocaleString()}</td>
                <td style={{padding:'8px 12px'}}>
                  <AdminBadge label={hs.isHotspot?'🔥 Hotspot':'Off'} color={hs.isHotspot?'#b8860b':'#aaa'} />
                </td>
                <td style={{padding:'8px 12px'}}>
                  <button className="adm-btn adm-btn-primary" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>toggleHotspot(i)}>
                    {hs.isHotspot?'Remove':'Set Hotspot'}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="adm-card" style={{padding:16}}>
        <div style={{fontWeight:600,marginBottom:12,fontSize:13,textTransform:'uppercase',letterSpacing:'0.5px'}}>Live Bid Board</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr style={{background:'#f5f5f5'}}>
              {['Bid ID','Slot','Bidder','Amount','Placed','Status','Action'].map(h=>(
                <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600,borderBottom:'1px solid #e0e0e0',fontSize:11,textTransform:'uppercase',letterSpacing:'0.3px'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bids.map((b,i)=>(
              <tr key={b.id||i} style={{borderBottom:'1px solid #f0f0f0',background:b.status==='Accepted'?'#f0f7f0':b.status==='Outbid'?'#fff5f5':'#fff'}}>
                <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11}}>{b.id}</td>
                <td style={{padding:'8px 12px',fontSize:11}}>{SPORT_ICONS[b.sport]||''} {b.court} {String(b.hour).padStart(2,'0')}:00</td>
                <td style={{padding:'8px 12px'}}>{b.bidder}</td>
                <td style={{padding:'8px 12px',fontFamily:'monospace'}}>LKR {b.amount.toLocaleString()}</td>
                <td style={{padding:'8px 12px',fontFamily:'monospace'}}>{b.placed}</td>
                <td style={{padding:'8px 12px'}}>
                  <AdminBadge label={b.status} color={b.status==='Active'?'#2e7d32':b.status==='Accepted'?'#1565c0':b.status==='Outbid'?'#c62828':'#aaa'} />
                </td>
                <td style={{padding:'8px 12px'}}>
                  {b.status==='Active'&&(
                    <button className="adm-btn adm-btn-primary" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>acceptBid(b.id)}>Accept</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {bids.length===0&&<div style={{padding:'30px',textAlign:'center',color:'#aaa',fontSize:12}}>No active bids</div>}
      </div>
    </div>
  );
}

// ─── ADMIN PAGE: PACKAGES (with Equipment Config tab) ────────────────────────
function PackagesPage({ packages, setPackages, equipmentConfig, setEquipmentConfig }) {
  const pkgs = packages || PACKAGES_INIT;
  const [pageTab, setPageTab] = React.useState('packages');
  const [editItem, setEditItem] = React.useState(null); // {sport, id}
  const [editName, setEditName] = React.useState('');
  const [editPrice, setEditPrice] = React.useState('');

  const toggleActive = (id) => {
    if (setPackages) setPackages(prev=>prev.map(p=>p.id===id?{...p,active:!p.active}:p));
  };

  const startEdit = (sport, item) => {
    setEditItem({sport, id:item.id});
    setEditName(item.name);
    setEditPrice(String(item.price));
  };

  const saveEdit = () => {
    if (!editItem||!setEquipmentConfig) return;
    setEquipmentConfig(prev=>({
      ...prev,
      [editItem.sport]: prev[editItem.sport].map(i=>i.id===editItem.id?{...i,name:editName,price:Number(editPrice)}:i)
    }));
    setEditItem(null);
  };

  const SPORT_LABELS = ['pickleball','badminton','cricket','futsal'];

  return (
    <div>
      <div style={{display:'flex',gap:4,marginBottom:20}}>
        <button className={`adm-btn ${pageTab==='packages'?'adm-btn-primary':''}`} onClick={()=>setPageTab('packages')}>Packages</button>
        <button className={`adm-btn ${pageTab==='equipment'?'adm-btn-primary':''}`} onClick={()=>setPageTab('equipment')}>Equipment Config</button>
      </div>

      {pageTab==='packages'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
          {pkgs.map(p=>(
            <div key={p.id} className="adm-card" style={{padding:20,opacity:p.active?1:0.55}}>
              <div style={{fontSize:24,marginBottom:8}}>{p.icon}</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{p.name}</div>
              <div style={{fontSize:12,color:'#666',marginBottom:8,lineHeight:1.5}}>{p.desc||p.description}</div>
              <div style={{fontSize:13,fontFamily:'monospace',fontWeight:600,marginBottom:12}}>{p.displayPrice}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <AdminBadge label={p.active?'Active':'Inactive'} color={p.active?'#2e7d32':'#aaa'} />
                <AdminToggle checked={!!p.active} onChange={()=>toggleActive(p.id)} />
              </div>
            </div>
          ))}
        </div>
      )}

      {pageTab==='equipment'&&(
        <div>
          {SPORT_LABELS.map(sport=>{
            const items = (equipmentConfig||EQUIPMENT_CONFIG_INIT)[sport]||[];
            return (
              <div key={sport} className="adm-card" style={{padding:16,marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:13,textTransform:'capitalize',marginBottom:12}}>{sport}</div>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{background:'#f5f5f5'}}>
                      {['Item Name','Price (LKR)','Actions'].map(h=>(
                        <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600,borderBottom:'1px solid #e0e0e0',fontSize:11,textTransform:'uppercase',letterSpacing:'0.3px'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(item=>(
                      <tr key={item.id} style={{borderBottom:'1px solid #f0f0f0'}}>
                        {editItem&&editItem.sport===sport&&editItem.id===item.id ? (
                          <>
                            <td style={{padding:'8px 12px'}}>
                              <input className="adm-input-field" value={editName} onChange={e=>setEditName(e.target.value)} style={{width:'100%',minWidth:0}} />
                            </td>
                            <td style={{padding:'8px 12px'}}>
                              <input className="adm-input-field" type="number" value={editPrice} onChange={e=>setEditPrice(e.target.value)} style={{width:90}} />
                            </td>
                            <td style={{padding:'8px 12px'}}>
                              <button className="adm-btn adm-btn-primary" style={{fontSize:11,padding:'3px 8px',marginRight:4}} onClick={saveEdit}>Save</button>
                              <button className="adm-btn" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>setEditItem(null)}>Cancel</button>
                            </td>
                          </>
                        ) : (
                          <>
                            <td style={{padding:'8px 12px'}}>{item.name}</td>
                            <td style={{padding:'8px 12px',fontFamily:'monospace'}}>{item.price}</td>
                            <td style={{padding:'8px 12px'}}>
                              <button className="adm-btn adm-btn-primary" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>startEdit(sport,item)}>Edit</button>
                            </td>
                          </>
                        )}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const [form, setForm] = React.useState({name:'',email:'',role:'Staff'});

  const add = () => {
    setAdmins(prev=>[...prev,{id:`ADM-${Date.now()}`,name:form.name,email:form.email,role:form.role,status:'Active',joined:'2026-04-20'}]);
    setShowAdd(false); setForm({name:'',email:'',role:'Staff'});
  };

  const toggleStatus = (id) => setAdmins(prev=>prev.map(a=>a.id===id?{...a,status:a.status==='Active'?'Inactive':'Active'}:a));

  return (
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="adm-btn adm-btn-primary" onClick={()=>setShowAdd(true)}>+ Add Admin</button>
      </div>
      <div className="adm-card" style={{padding:0,overflow:'hidden',marginBottom:20}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr style={{background:'#f5f5f5'}}>
              {['Name','Email','Role','Status','Joined','Actions'].map(h=>(
                <th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:600,borderBottom:'1px solid #e0e0e0',fontSize:11,textTransform:'uppercase',letterSpacing:'0.3px'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {admins.map(a=>(
              <tr key={a.id} style={{borderBottom:'1px solid #f0f0f0'}}>
                <td style={{padding:'9px 12px',fontWeight:500}}>{a.name}</td>
                <td style={{padding:'9px 12px',fontFamily:'monospace',fontSize:11}}>{a.email}</td>
                <td style={{padding:'9px 12px'}}>{a.role}</td>
                <td style={{padding:'9px 12px'}}><AdminBadge label={a.status} color={a.status==='Active'?'#2e7d32':'#aaa'} /></td>
                <td style={{padding:'9px 12px',fontFamily:'monospace',fontSize:11}}>{a.joined}</td>
                <td style={{padding:'9px 12px'}}>
                  {a.email!=='admin@bounce.com'&&(
                    <button className="adm-btn" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>toggleStatus(a.id)}>
                      {a.status==='Active'?'Deactivate':'Activate'}
                    </button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showAdd&&(
        <AdminModal title="Add Admin" onClose={()=>setShowAdd(false)}>
          <FormGroup label="Name"><input className="adm-input-field" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} /></FormGroup>
          <FormGroup label="Email"><input className="adm-input-field" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} /></FormGroup>
          <FormGroup label="Role">
            <select className="adm-input-field" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              {['Super Admin','Manager','Staff'].map(r=><option key={r}>{r}</option>)}
            </select>
          </FormGroup>
          <button className="adm-btn adm-btn-primary" style={{width:'100%'}} onClick={add} disabled={!form.name||!form.email}>Add Admin</button>
        </AdminModal>
      )}
    </div>
  );
}

// ─── ADMIN SHELL ─────────────────────────────────────────────────────────────
function AdminShell({ sharedBookings, setSharedBookings, sharedBids, setSharedBids, hotspotConfig, setHotspotConfig, equipmentConfig, setEquipmentConfig, packages, setPackages, sharedRecovery, setSharedRecovery }) {
  const [loggedIn, setLoggedIn] = React.useState(false);
  const [screen, setScreen] = React.useState('dashboard');
  const [loginEmail, setLoginEmail] = React.useState('');
  const [loginPass, setLoginPass] = React.useState('');
  const [loginErr, setLoginErr] = React.useState('');

  const handleLogin = () => {
    if (loginEmail==='admin@bounce.com'&&loginPass==='bounce2024') {
      setLoggedIn(true); setLoginErr('');
    } else {
      setLoginErr('Invalid credentials');
    }
  };

  if (!loggedIn) {
    return (
      <div className="adm-login-wrap">
        <div className="adm-card" style={{width:340,padding:32}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:'-1px',fontFamily:'monospace'}}>BOUNCE</div>
            <div style={{fontSize:12,color:'#888',marginTop:4}}>Admin Dashboard</div>
          </div>
          <FormGroup label="Email">
            <input className="adm-input-field" type="email" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} placeholder="admin@bounce.com" onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
          </FormGroup>
          <FormGroup label="Password">
            <input className="adm-input-field" type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
          </FormGroup>
          {loginErr&&<div style={{color:'#c62828',fontSize:12,marginBottom:12,textAlign:'center'}}>{loginErr}</div>}
          <button className="adm-btn adm-btn-primary" style={{width:'100%'}} onClick={handleLogin}>Sign In</button>
          <div style={{textAlign:'center',marginTop:12,fontSize:11,color:'#aaa'}}>admin@bounce.com / bounce2024</div>
        </div>
      </div>
    );
  }

  const pageProps = { sharedBookings, setSharedBookings, sharedBids, setSharedBids, hotspotConfig, setHotspotConfig, equipmentConfig, setEquipmentConfig, packages, setPackages, sharedRecovery, setSharedRecovery };

  const renderPage = () => {
    switch(screen) {
      case 'dashboard': return <DashboardHome sharedBookings={sharedBookings} sharedBids={sharedBids} sharedRecovery={sharedRecovery} />;
      case 'bookings':  return <BookingsPage sharedBookings={sharedBookings} setSharedBookings={setSharedBookings} />;
      case 'manual':    return <ManualBookingPage setSharedBookings={setSharedBookings} />;
      case 'courts':    return <CourtManagementPage sharedBookings={sharedBookings} />;
      case 'recovery':  return <RecoveryAreaPage sharedRecovery={sharedRecovery} />;
      case 'bids':      return <HotspotBidsPage sharedBids={sharedBids} setSharedBids={setSharedBids} hotspotConfig={hotspotConfig} setHotspotConfig={setHotspotConfig} />;
      case 'players':   return <PlayersPage />;
      case 'kids':      return <KidsZoneManagementPage sharedBookings={sharedBookings} />;
      case 'packages':  return <PackagesPage packages={packages} setPackages={setPackages} equipmentConfig={equipmentConfig} setEquipmentConfig={setEquipmentConfig} />;
      case 'admins':    return <AdminAccessPage />;
      default:          return <DashboardHome sharedBookings={sharedBookings} sharedBids={sharedBids} sharedRecovery={sharedRecovery} />;
    }
  };

  return (
    <AdminLayout screen={screen} setScreen={setScreen} onLogout={()=>setLoggedIn(false)}>
      {renderPage()}
    </AdminLayout>
  );
}

// ─── SHARED APP (root — owns all cross-cutting state) ────────────────────────
function SharedApp() {
  const [sharedBookings,   setSharedBookings]   = React.useState(BOOKINGS_INIT);
  const [sharedBids,       setSharedBids]       = React.useState(MOCK_BIDS);
  const [hotspotConfig,    setHotspotConfig]    = React.useState(HOTSPOT_CONFIG_INIT);
  const [equipmentConfig,  setEquipmentConfig]  = React.useState(EQUIPMENT_CONFIG_INIT);
  const [packages,         setPackages]         = React.useState(PACKAGES_INIT);
  const [sharedRecovery,   setSharedRecovery]   = React.useState(MOCK_RECOVERY);

  return (
    <div className="root-layout">
      <div className="left-panel">
        <CustomerApp
          sharedBookings={sharedBookings}
          setSharedBookings={setSharedBookings}
          sharedBids={sharedBids}
          setSharedBids={setSharedBids}
          hotspotConfig={hotspotConfig}
          equipmentConfig={equipmentConfig}
          packages={packages}
          sharedRecovery={sharedRecovery}
          setSharedRecovery={setSharedRecovery}
        />
      </div>
      <div className="right-panel">
        <AdminShell
          sharedBookings={sharedBookings}
          setSharedBookings={setSharedBookings}
          sharedBids={sharedBids}
          setSharedBids={setSharedBids}
          hotspotConfig={hotspotConfig}
          setHotspotConfig={setHotspotConfig}
          equipmentConfig={equipmentConfig}
          setEquipmentConfig={setEquipmentConfig}
          packages={packages}
          setPackages={setPackages}
          sharedRecovery={sharedRecovery}
          setSharedRecovery={setSharedRecovery}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SharedApp />);
</script>
</body>
</html>
